client_id = "6be6e394f01f7143159be03196ec0d0a"
name = "OTPRclub"
application_url = "https://testotp-2pky.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_customers,read_themes,write_themes"

[auth]
redirect_urls = [ "https://testotp-2pky.onrender.com/auth/callback" ]

[app_proxy]
url = "https://testotp-2pky.onrender.com"
subpath = "otp-login-pro"
prefix = "apps"

[pos]
embedded = false
